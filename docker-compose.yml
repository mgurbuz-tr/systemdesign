services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: system-design-editor:latest
    container_name: system-design-editor
    # Single container: nginx (SPA + /ws proxy) + presence WS server,
    # supervised by supervisord. See Dockerfile + supervisord.conf.
    ports:
      - "6000:80"
    expose:
      - "80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
